name: Update IANSEO Live Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest IANSEO data
        env:
          IANSEO_URL: ${{ vars.IANSEO_URL }}
          IANSEO_CLUB_KEYWORDS: ${{ vars.IANSEO_CLUB_KEYWORDS }}
        run: |
          URL="${IANSEO_URL:-https://www.ianseo.net/TourData/2026/27251/IC.php}"
          CLUBS="${IANSEO_CLUB_KEYWORDS:-Seynod,0174246}"
          python scripts/fetch_ianseo.py --url "$URL" --club-keywords "$CLUBS" --output data/live.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh IANSEO live data"
          git push
