name: Find Next Seynod Competition

on:
  workflow_dispatch:
    inputs:
      club_keywords:
        description: "Club keywords/ids (comma separated), ex: 0174246,seynod"
        required: false
        default: ""
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  find-next:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build next competition file
        env:
          WF_CLUB_KEYWORDS: ${{ github.event.inputs.club_keywords }}
          NEXT_KEYWORDS: ${{ vars.IANSEO_CLUB_KEYWORDS }}
          NEXT_COUNTRY: ${{ vars.IANSEO_COUNTRY }}
        run: |
          KEYWORDS="${WF_CLUB_KEYWORDS:-${NEXT_KEYWORDS:-Seynod,0174246}}"
          COUNTRY="${NEXT_COUNTRY:-FRA}"
          python scripts/find_next_competition.py --keywords "$KEYWORDS" --country "$COUNTRY" --output data/next_competition.json

      - name: Refresh competition catalog
        env:
          NEXT_COUNTRY: ${{ vars.IANSEO_COUNTRY }}
        run: |
          COUNTRY="${NEXT_COUNTRY:-FRA}"
          python scripts/build_competition_catalog.py --country "$COUNTRY" --output data/competition_catalog.json

      - name: Print result JSON
        run: cat data/next_competition.json

      - name: Add human summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("data/next_competition.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          out = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])

          lines = ["## Next Club Competition Result", ""]
          lines.append(f"- Generated: `{data.get('generated_at_utc', '-')}`")
          lines.append(f"- Country: `{data.get('country', '-')}`")
          lines.append(f"- Keywords: `{', '.join(data.get('keywords', [])) or '-'}`")
          lines.append(f"- Checked candidates: `{data.get('checked_candidates', 0)}`")

          if data.get("found") and data.get("next_competition"):
            comp = data["next_competition"]
            lines.append("")
            lines.append("### Found")
            lines.append(f"- Name: **{comp.get('name', '-')}**")
            lines.append(f"- Date: `{comp.get('date_text', '-')}`")
            lines.append(f"- Organizer: `{comp.get('organizer', '-')}`")
            lines.append(f"- Details: {comp.get('details_url', '-')}")
            lines.append(f"- IC: {comp.get('ic_url', '-')}")
            lines.append(f"- ENA: {comp.get('ena_url', '-')}")
            entries = comp.get("club_entries") or comp.get("seynod_entries") or []
            lines.append(f"- Club entries: `{len(entries)}`")
            if entries:
              lines.append("")
              lines.append("| Archer | Category |")
              lines.append("|---|---|")
              for e in entries[:30]:
                lines.append(f"| {e.get('name', '-')} | {e.get('category', '-')} |")
          else:
            lines.append("")
            lines.append("### Not found")
            lines.append(f"- Message: {data.get('message', 'No message')}")

          out.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/next_competition.json data/competition_catalog.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh next competition lookup"
          git push
