name: Find Next Seynod Competition

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  find-next:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build next competition file
        env:
          NEXT_KEYWORDS: ${{ vars.IANSEO_CLUB_KEYWORDS }}
          NEXT_COUNTRY: ${{ vars.IANSEO_COUNTRY }}
        run: |
          KEYWORDS="${NEXT_KEYWORDS:-Seynod,0174246}"
          COUNTRY="${NEXT_COUNTRY:-FRA}"
          python scripts/find_next_competition.py --keywords "$KEYWORDS" --country "$COUNTRY" --output data/next_competition.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/next_competition.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh next competition lookup"
          git push
