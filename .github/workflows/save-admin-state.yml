name: Save Shared Admin State

on:
  workflow_dispatch:
    inputs:
      state_b64:
        description: "Base64 encoded JSON state"
        required: true
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  save-admin-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Decode and save state
        env:
          WF_STATE_B64: ${{ github.event.inputs.state_b64 }}
        run: |
          python - <<'PY'
          import base64
          import datetime as dt
          import json
          import os
          from pathlib import Path

          b64 = (os.getenv("WF_STATE_B64") or "").strip()
          if not b64:
            raise SystemExit("Missing state_b64 input")

          # Allow unpadded base64
          padding = "=" * ((4 - (len(b64) % 4)) % 4)
          raw = base64.urlsafe_b64decode((b64 + padding).encode("ascii"))
          payload = json.loads(raw.decode("utf-8"))
          payload["updatedAtUtc"] = dt.datetime.now(dt.timezone.utc).isoformat()

          target = Path("data/admin_state.json")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({"saved": str(target), "keys": list(payload.keys())}, ensure_ascii=False))
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admin_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): update shared admin state"
          git push
